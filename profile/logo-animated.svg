      <feBlend mode="normal" in2="BackgroundImageFix" result="effect1_dropShadow_1188_4681"/>
      <feBlend mode="normal" in="SourceGraphic" in2="effect1_dropShadow_1188_4681" result="shape"/>
    </filter>

    <!-- Shimmer: thick, softly-blurred tilted band that sweeps across the logo like a diffuse wash -->
    <linearGradient id="shimmer-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#ffffff" stop-opacity="0"/>
