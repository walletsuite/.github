<svg xmlns="http://www.w3.org/2000/svg" width="600" height="660" viewBox="0 0 600 660" fill="none" role="img" aria-label="WalletSuite animated logo">
  <title>WalletSuite</title>
  <style>
    /* Layered-assembly — each layer slides into place with a stagger, then holds.
       Plays once and stops at the assembled state. Total duration: 2.5s. */
    .layer { opacity: 0; transform-box: fill-box; transform-origin: center; will-change: transform, opacity; }

    @keyframes l1 {
      0%   { transform: translate(180px, -30px); opacity: 0; }
      24%  { transform: translate(0, 0);         opacity: 1; }
      100% { transform: translate(0, 0);         opacity: 1; }
    }
    @keyframes l2 {
      0%,  6%  { transform: translate(-200px, 10px); opacity: 0; }
      30%      { transform: translate(0, 0);          opacity: 1; }
      100%     { transform: translate(0, 0);          opacity: 1; }
    }
    @keyframes l3 {
      0%, 12%  { transform: translate(-40px, -160px); opacity: 0; }
      36%      { transform: translate(0, 0);           opacity: 1; }
      100%     { transform: translate(0, 0);           opacity: 1; }
    }
    @keyframes l4 {
      0%, 18%  { transform: translate(-160px, 120px); opacity: 0; }
      42%      { transform: translate(0, 0);           opacity: 1; }
      100%     { transform: translate(0, 0);           opacity: 1; }
    }
    @keyframes l5 {
      0%, 24%  { transform: translate(-140px, -100px) scale(.96); opacity: 0; }
      48%      { transform: translate(0, 0) scale(1);              opacity: 1; }
      100%     { transform: translate(0, 0) scale(1);              opacity: 1; }
    }
    @keyframes l6 {
      0%, 30%  { transform: translate(200px, 40px) scale(.97); opacity: 0; }
      54%      { transform: translate(0, 0) scale(1.02);        opacity: 1; }
      62%      { transform: translate(0, 0) scale(1);           opacity: 1; }
      100%     { transform: translate(0, 0) scale(1);           opacity: 1; }
    }

    .l1 { animation: l1 2.5s cubic-bezier(.2,.7,.3,1) 1 forwards; }
    .l2 { animation: l2 2.5s cubic-bezier(.2,.7,.3,1) 1 forwards; }
    .l3 { animation: l3 2.5s cubic-bezier(.2,.7,.3,1) 1 forwards; }
    .l4 { animation: l4 2.5s cubic-bezier(.2,.7,.3,1) 1 forwards; }
    .l5 { animation: l5 2.5s cubic-bezier(.2,.7,.3,1) 1 forwards; }
    .l6 { animation: l6 2.5s cubic-bezier(.15,.8,.25,1.05) 1 forwards; }

    /* Slow white-gradient shimmer — starts after assembly and loops continuously. */
    .shimmer {
      opacity: 0;
      animation: shimmer-move 4s linear infinite;
      animation-delay: 1.8s;
    }
    @keyframes shimmer-move {
      0%    { transform: translateX(-1000px); opacity: 0; }
      8%    { opacity: 0; }
      50%   { opacity: .55; }
      85%   { opacity: 0; transform: translateX(1000px); }
      100%  { transform: translateX(1000px); opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .layer, .shimmer { animation: none !important; opacity: 1 !important; transform: none !important; }
    }
  </style>

