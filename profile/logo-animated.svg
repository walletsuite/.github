      <stop offset="0.75" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shimmer-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>

