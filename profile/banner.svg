<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B3FE4"/>
      <stop offset="100%" style="stop-color:#C63DD9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B3FE4;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#C63DD9;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7B3FE4;stop-opacity:0"/>
    </linearGradient>

    <!-- Animated scan line -->
    <linearGradient id="scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B3FE4;stop-opacity:0"/>
      <stop offset="45%" style="stop-color:#7B3FE4;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#C63DD9;stop-opacity:0.6"/>
      <stop offset="55%" style="stop-color:#7B3FE4;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#7B3FE4;stop-opacity:0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Particle glow filter -->
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#7B3FE4">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
  </g>

  <!-- Animated scan line -->
  <rect width="800" height="200" fill="url(#scan)" opacity="0.5"/>

  <!-- Bottom accent line -->
  <rect y="196" width="800" height="4" fill="url(#purple)" opacity="0.8"/>

  <!-- Animated flowing dots -->
  <g filter="url(#softglow)">
    <circle r="2" fill="#7B3FE4" opacity="0.8">
      <animateMotion dur="8s" repeatCount="indefinite" path="M0,180 Q200,120 400,140 T800,100"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.5" fill="#C63DD9" opacity="0.6">
      <animateMotion dur="6s" repeatCount="indefinite" path="M0,100 Q200,160 400,80 T800,150"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="#9B5FE8" opacity="0.5">
      <animateMotion dur="10s" repeatCount="indefinite" path="M0,60 Q300,180 500,40 T800,120"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle r="1" fill="#7B3FE4" opacity="0.7">
      <animateMotion dur="7s" repeatCount="indefinite" path="M800,160 Q600,40 400,120 T0,80"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Wallet Suite logo mark (stylized W) -->
  <g transform="translate(310, 50)" filter="url(#softglow)">
    <circle cx="90" cy="50" r="42" fill="none" stroke="url(#purple)" stroke-width="1" opacity="0.2">
      <animate attributeName="r" values="42;46;42" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.08;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <path d="M52,25 L68,75 L82,45 L96,75 L112,25" fill="none" stroke="url(#purple)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="2s" fill="freeze"/>
    </path>
  </g>

  <!-- Text -->
  <text x="400" y="145" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="url(#purple)" letter-spacing="6">
    WALLET SUITE
  </text>
  <text x="400" y="172" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B6C98" letter-spacing="4">
    WALLET AS A SERVICE
  </text>
</svg>
