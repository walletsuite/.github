<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#141420"/>
      <stop offset="100%" stop-color="#09090f"/>
    </radialGradient>

    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B3FE4"/>
      <stop offset="100%" stop-color="#C63DD9"/>
    </linearGradient>

    <radialGradient id="ambientGlow" cx="50%" cy="32%" r="22%">
      <stop offset="0%" stop-color="#7B3FE4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7B3FE4" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="lineLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B3FE4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#7B3FE4" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="lineRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B3FE4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7B3FE4" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="particleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <linearGradient id="scanLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C63DD9" stop-opacity="0"/>
      <stop offset="48%" stop-color="#C63DD9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C63DD9" stop-opacity="0.04"/>
      <stop offset="52%" stop-color="#C63DD9" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C63DD9" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 -1" to="0 1" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bg)"/>
  <rect width="800" height="300" fill="url(#ambientGlow)"/>

  <!-- Network constellation — nodes -->
  <g fill="#7B3FE4">
    <circle cx="85" cy="30" r="1.5" opacity="0.14">
      <animate attributeName="opacity" values="0.14;0.06;0.14" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="178" cy="56" r="1" opacity="0.11"/>
    <circle cx="262" cy="20" r="1.5" opacity="0.09"/>
    <circle cx="538" cy="20" r="1.5" opacity="0.09"/>
    <circle cx="622" cy="56" r="1" opacity="0.11"/>
    <circle cx="715" cy="30" r="1.5" opacity="0.14">
      <animate attributeName="opacity" values="0.14;0.06;0.14" dur="7s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="38" cy="130" r="1" opacity="0.1"/>
    <circle cx="55" cy="210" r="1.5" opacity="0.12">
      <animate attributeName="opacity" values="0.12;0.05;0.12" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="275" r="1" opacity="0.07"/>
    <circle cx="762" cy="130" r="1" opacity="0.1"/>
    <circle cx="745" cy="210" r="1.5" opacity="0.12">
      <animate attributeName="opacity" values="0.12;0.05;0.12" dur="8s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="768" cy="275" r="1" opacity="0.07"/>
    <circle cx="145" cy="280" r="1.5" opacity="0.09"/>
    <circle cx="655" cy="280" r="1.5" opacity="0.09"/>
  </g>

  <!-- Network constellation — connections -->
  <g stroke="#7B3FE4" stroke-width="0.5" opacity="0.04">
    <line x1="85" y1="30" x2="178" y2="56"/>
    <line x1="178" y1="56" x2="262" y2="20"/>
    <line x1="538" y1="20" x2="622" y2="56"/>
    <line x1="622" y1="56" x2="715" y2="30"/>
    <line x1="38" y1="130" x2="55" y2="210"/>
    <line x1="55" y1="210" x2="32" y2="275"/>
    <line x1="32" y1="275" x2="145" y2="280"/>
    <line x1="762" y1="130" x2="745" y2="210"/>
    <line x1="745" y1="210" x2="768" y2="275"/>
    <line x1="768" y1="275" x2="655" y2="280"/>
  </g>

  <!-- Scan line overlay -->
  <rect width="800" height="300" fill="url(#scanLine)"/>

  <!-- Horizontal accent lines extending from logo -->
  <line x1="100" y1="95" x2="338" y2="95" stroke="url(#lineLeft)" stroke-width="0.5"/>
  <line x1="462" y1="95" x2="700" y2="95" stroke="url(#lineRight)" stroke-width="0.5"/>

  <!-- Logo: W in circle -->
  <g filter="url(#glow)">
    <!-- Outer breathing ring -->
    <circle cx="400" cy="95" r="52" fill="none" stroke="#7B3FE4" stroke-width="0.5" opacity="0.1">
      <animate attributeName="r" values="52;58;52" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.03;0.1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Inner ring -->
    <circle cx="400" cy="95" r="40" fill="none" stroke="url(#brand)" stroke-width="1.5" opacity="0.25"/>
    <!-- W mark -->
    <path d="M368,71 L385,119 L400,87 L415,119 L432,71"
          fill="none" stroke="url(#brand)" stroke-width="4.5"
          stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="2s" fill="freeze"/>
    </path>
  </g>

  <!-- Text: WALLET SUITE -->
  <text x="400" y="208" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="30" font-weight="700" fill="url(#brand)" letter-spacing="8">
    WALLET SUITE
  </text>

  <!-- Text: WALLET AS A SERVICE -->
  <text x="400" y="240" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="11" fill="#6B6C98" letter-spacing="4">
    WALLET AS A SERVICE
  </text>

  <!-- Bottom accent line -->
  <rect y="296" width="800" height="4" fill="url(#brand)" opacity="0.6"/>

  <!-- Ambient floating particles -->
  <g filter="url(#particleGlow)">
    <circle r="2" fill="#7B3FE4">
      <animateMotion dur="14s" repeatCount="indefinite" path="M50,170 Q250,90 450,150 T780,70"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.5" fill="#C63DD9">
      <animateMotion dur="10s" repeatCount="indefinite" path="M780,110 Q580,200 380,130 T20,210"/>
      <animate attributeName="opacity" values="0;0.4;0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle r="1" fill="#9B5FE8">
      <animateMotion dur="16s" repeatCount="indefinite" path="M120,250 Q350,180 550,260 T720,220"/>
      <animate attributeName="opacity" values="0;0.3;0" dur="16s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
